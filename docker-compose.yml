version: '3.9'
services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_growth_systems
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: always
    env_file:
      - .env.example
    ports:
      - '4000:4000'
    depends_on:
      - db

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://server:4000/api
    ports:
      - '3000:3000'
    depends_on:
      - server

volumes:
  db-data:
